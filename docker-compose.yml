services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reef_marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-reef}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reef}
    ports:
      - "5432:5432"
    volumes:
      - ./storage/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reef} -d ${POSTGRES_DB:-reef_marketplace}"]
      interval: 5s
      timeout: 5s
      retries: 20

  ipfs:
    image: ipfs/kubo:v0.33.2
    restart: unless-stopped
    ports:
      - "4001:4001"
      - "${IPFS_HOST_API_PORT:-5002}:5001"
      - "${IPFS_HOST_GATEWAY_PORT:-8081}:8080"
    volumes:
      - ./storage/ipfs:/data/ipfs
    healthcheck:
      test: ["CMD-SHELL", "ipfs id >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ipfs:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://reef:reef@postgres:5432/reef_marketplace}
      IPFS_API_URL: http://ipfs:5001
      IPFS_GATEWAY_URL: ${IPFS_GATEWAY_URL:-http://localhost:8081/ipfs}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:4000}
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:3000}
      STORAGE_ROOT: ${STORAGE_ROOT:-storage}
      STORAGE_PUBLIC_DIR: ${STORAGE_PUBLIC_DIR:-storage/public}
      STORAGE_GENERATED_DIR: ${STORAGE_GENERATED_DIR:-storage/public/generated}
      STORAGE_IPFS_FALLBACK_DIR: ${STORAGE_IPFS_FALLBACK_DIR:-storage/public/ipfs}
      DUMMY_DATA_SEED: ${DUMMY_DATA_SEED:-}
      ENABLE_LIVE_TRADING: ${ENABLE_LIVE_TRADING:-true}
      PORT: 4000
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./storage:/app/storage
      - ./external/projectopensea:/app/external/projectopensea:ro

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-3000}:3000"
